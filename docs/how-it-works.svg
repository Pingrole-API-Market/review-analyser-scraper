<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" role="img" aria-label="Trustpilot Review Scraper flow: user request, Trustpilot scrape, Apify platform, email and Discord delivery">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="340" fill="#FAFAFA" rx="12"/>

  <!-- User Request -->
  <g filter="url(#shadow)">
    <rect x="20" y="30" width="200" height="280" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="120" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#78350F">User Request</text>
    <rect x="36" y="78" width="168" height="38" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="120" y="102" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#78350F">Business + location</text>
    <rect x="36" y="126" width="168" height="38" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="120" y="150" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#78350F">Review limit</text>
    <rect x="36" y="174" width="168" height="38" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="120" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#78350F">get_as_file + format</text>
    <rect x="36" y="222" width="168" height="38" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="120" y="246" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#78350F">Email or Discord</text>
  </g>

  <!-- Trustpilot -->
  <g filter="url(#shadow)">
    <rect x="250" y="30" width="200" height="280" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="350" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#064E3B">Trustpilot</text>
    <rect x="266" y="110" width="168" height="44" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="350" y="137" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#064E3B">Find profile</text>
    <rect x="266" y="168" width="168" height="44" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="350" y="195" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#064E3B">Scrape reviews</text>
    <rect x="266" y="226" width="168" height="44" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="350" y="253" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#064E3B">Company details</text>
  </g>

  <!-- Apify -->
  <g filter="url(#shadow)">
    <rect x="480" y="30" width="200" height="280" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="580" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">Apify Platform</text>
    <rect x="496" y="120" width="168" height="50" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="580" y="150" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1E3A8A">Dataset JSON</text>
    <rect x="496" y="190" width="168" height="50" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="580" y="212" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1E3A8A">Build XLSX</text>
    <text x="580" y="228" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#1E3A8A">CSV / JSON</text>
    <rect x="496" y="260" width="168" height="36" rx="6" fill="#FFE4E6" stroke="#F43F5E" stroke-width="1"/>
    <text x="580" y="282" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#881337">View in Console / API</text>
  </g>

  <!-- Delivery -->
  <g filter="url(#shadow)">
    <rect x="710" y="30" width="230" height="280" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="825" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#4C1D95">File Delivery</text>
    <text x="825" y="76" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#6D28D9">optional</text>
    <rect x="726" y="120" width="198" height="56" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
    <text x="825" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#4C1D95">Email attachment</text>
    <text x="825" y="163" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#6D28D9">XLSX · CSV · JSON</text>
    <rect x="726" y="200" width="198" height="56" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
    <text x="825" y="225" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#4C1D95">Discord DM</text>
    <text x="825" y="243" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#6D28D9">XLSX · CSV · JSON</text>
  </g>

  <!-- Arrows -->
  <line x1="220" y1="170" x2="248" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="170" x2="478" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="155" x2="724" y2="145" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="210" x2="724" y2="230" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
